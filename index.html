<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boba Buds</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Site header with primary navigation -->
  <header class="site-header">
    <div class="nav-bar">
      <a class="site-title" href="index.html" aria-label="Boba Buds home">
        <img class="site-logo" src="Images/bobabudslogo.png" alt="Boba Buds">
        <img class="site-panda" src="Images/bobabudspanda.png" alt="Boba Buds panda mascot">
      </a>
      <nav aria-label="Main navigation">
        <ul class="nav-links">
          <li><a href="Pages/profile.html">Profile</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="main-content">
    <section class="hero container" aria-labelledby="hero-heading">
      <h1 id="hero-heading">Welcome to Boba Buds.</h1>
      <p class="hero-subtext">Search nearby boba shops quickly and discover your next favorite drink spot.</p>

      <!-- Search area -->
      <section class="search-region" aria-label="Boba shop search">
        <label class="sr-only" for="shop-search">Search for a boba shop</label>
        <input
          id="shop-search"
          name="shop-search"
          type="search"
          placeholder="Search for a boba shop..."
          autocomplete="off"
        >

        <!-- Geolocation controls for location-based search -->
        <!-- <div class="geo-controls">
          <button id="geoButton" type="button" class="geo-button">Use my location</button>
          <p id="geoStatus" class="geo-status" aria-live="polite"></p>
        </div> -->
      </section>
    </section>
  </main>

  <script>
    const searchInput = document.getElementById("shop-search");
    
    // Create dropdown container
    const dropdown = document.createElement('div');
    dropdown.className = 'search-dropdown';
    dropdown.style.cssText = `
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 2px solid #789048;
      border-top: none;
      border-radius: 0 0 12px 12px;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: 0 6px 18px rgba(96, 72, 72, 0.14);
      display: none;
      z-index: 1000;
    `;
    
    // Make search region position relative for dropdown positioning
    const searchRegion = document.querySelector('.search-region');
    searchRegion.style.position = 'relative';
    searchRegion.appendChild(dropdown);

    let selectedShop = null;
    let searchTimeout;

    // Search as user types
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();

      if (query.length === 0) {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
        selectedShop = null;
        return;
      }

      // Debounce: wait 200ms after user stops typing
      searchTimeout = setTimeout(() => {
        searchBobaSpots(query);
      }, 200);
    });

    // Handle Enter key
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && selectedShop) {
        e.preventDefault();
        goToLogVisit(selectedShop);
      }
    });

    async function searchBobaSpots(query) {
      try {
        const response = await fetch(`http://localhost:5500/api/spots/search?q=${encodeURIComponent(query)}`);
        const spots = await response.json();

        if (spots.length === 0) {
          dropdown.innerHTML = '<div style="padding: 1rem; color: #6c5656; font-size: 0.95rem;">No shops found</div>';
          dropdown.style.display = 'block';
          return;
        }

        // Display dropdown items (Google-style)
        dropdown.innerHTML = spots.map(spot => `
          <div class="dropdown-item" data-spot-id="${spot.id}" data-spot-name="${spot.name}" style="
            padding: 14px 18px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(120, 144, 72, 0.15);
          " onmouseover="this.style.background='rgba(192, 216, 96, 0.15)'" onmouseout="this.style.background='white'">
            <div style="font-weight: 600; color: #604848; font-size: 1rem;">${spot.name}</div>
            ${spot.address ? `<div style="font-size: 0.875rem; color: #6c5656; margin-top: 4px;">${spot.address}</div>` : ''}
          </div>
        `).join('');

        dropdown.style.display = 'block';

        // Add click handlers to dropdown items
        document.querySelectorAll('.dropdown-item').forEach(item => {
          item.addEventListener('click', () => {
            const shop = {
              id: item.dataset.spotId,
              name: item.dataset.spotName
            };
            
            // Autofill search box
            searchInput.value = shop.name;
            selectedShop = shop;
            dropdown.style.display = 'none';
            
            // Auto-navigate to log visit page
            goToLogVisit(shop);
          });
        });

      } catch (error) {
        console.error('Search error:', error);
        dropdown.innerHTML = '<div style="padding: 1rem; color: #c05048; font-size: 0.95rem;">Search failed. Is the backend running?</div>';
        dropdown.style.display = 'block';
      }
    }

    function goToLogVisit(shop) {
      window.location.href = `Pages/log-visit.html?spot_id=${shop.id}&spot_name=${encodeURIComponent(shop.name)}`;
    }

    // Hide dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!searchRegion.contains(e.target)) {
        dropdown.style.display = 'none';
      }
    });
  </script>
</body>
</html>
