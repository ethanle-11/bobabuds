<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Visit | Boba Buds</title>
  <link rel="stylesheet" href="log-visit.css">
</head>
<body>
  <header class="site-header">
    <div class="nav-bar">
      <a class="site-title" href="../index.html" aria-label="Boba Buds home">
        <img class="site-logo" src="../Images/bobabudslogo.png" alt="Boba Buds">
        <img class="site-panda" src="../Images/bobabudspanda.png" alt="Boba Buds panda mascot">
      </a>
      <nav aria-label="Main navigation">
        <ul class="nav-links">
          <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="log-visit-container">
      <h1>Log Your Visit</h1>
      <p class="shop-name" id="shopName">Loading...</p>

      <form id="logVisitForm">
        <div class="form-group">
          <label for="spent">Amount Spent <span class="required">*</span></label>
          <input 
            type="number" 
            id="spent" 
            name="spent" 
            step="0.01" 
            min="0" 
            placeholder="6.50" 
            required
          >
        </div>

        <div class="form-group">
          <label for="rating">Rating <span class="required">*</span></label>
          <select id="rating" name="rating" required>
            <option value="">Select rating...</option>
            <option value="5">★★★★★ (5 stars)</option>
            <option value="4">★★★★☆ (4 stars)</option>
            <option value="3">★★★☆☆ (3 stars)</option>
            <option value="2">★★☆☆☆ (2 stars)</option>
            <option value="1">★☆☆☆☆ (1 star)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="notes">Notes (optional)</label>
          <textarea 
            id="notes" 
            name="notes" 
            placeholder="How was your drink? Any recommendations?"
          ></textarea>
        </div>

        <div class="button-group">
          <button type="button" class="btn btn-secondary" onclick="window.location.href='../index.html'">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            Log Visit
          </button>
        </div>
      </form>
    </div>
  </main>

  <script src="log-visit.js"></script>
</body>
</html>
